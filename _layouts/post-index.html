---
layout: default
---

<div style="max-width: 800px; margin: 2em auto; padding: 0 1em;">
  <h1 style="color: #3a2a22;">{{ page.title | default: "Artigos e Reflexões" }}</h1>
  
  {% for post in site.posts %}
  <div style="margin-bottom: 2em; padding: 1em; background: #faf7f2;">
    <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
    <p>{{ post.excerpt | strip_html | truncate: 200 }}</p>
    <small>{{ post.date | date: "%d/%m/%Y" }} | 
      {% for category in post.categories %}
        {{ category }}
      {% endfor %}
    </small>
  </div>
  {% endfor %}
</div>
