---
layout: default
---

<article class="post" style="max-width: 800px; margin: 2em auto; padding: 0 1em;">
  <header style="text-align: center; margin-bottom: 2em;">
    <h1 style="color: #3a2a22;">{{ page.title }}</h1>
    <p style="color: #666;">{{ page.date | date: "%d/%m/%Y" }}</p>
  </header>
  
  <div class="post-content" style="line-height: 1.6; font-size: 1.1em;">
    {{ content }}
  </div>
  
  {% if page.tags %}
  <div class="tags" style="margin-top: 2em;">
    Tags: {% for tag in page.tags %}
    <span style="background: #f0e9e2; padding: 0.2em 0.6em; border-radius: 3px;">{{ tag }}</span>
    {% endfor %}
  </div>
  {% endif %}
</article>
