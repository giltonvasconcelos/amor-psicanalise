# =============================================================
#   _config.yml - Blog de Saúde Mental
#   Tema: Minimal Mistakes | Autor: Gilton Vasconcelos
# =============================================================

title: "Mente em Equilíbrio"
subtitle: "Reflexões sobre saúde mental e bem-estar"
description: >-
  Um espaço acolhedor para falar sobre saúde mental, autocuidado
  e bem-estar emocional. Por Gilton Vasconcelos.

url: "https://giltonvasconcelos.github.io"
baseurl: ""
repository: "giltonvasconcelos/giltonvasconcelos.github.io"

# ---------------------------------------------------------------
# AUTOR
# ---------------------------------------------------------------
author:
  name: "Gilton Vasconcelos"
  avatar: "/assets/images/avatar.jpg"
  bio: "Apaixonado por saúde mental e bem-estar. Compartilho reflexões e recursos para cuidar da mente."
  location: "Brasil"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/giltonvasconcelos"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: ""   # adicione seu @
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: ""   # adicione seu perfil

# ---------------------------------------------------------------
# TEMA — Paleta Neutra (bege, cinza, branco)
# ---------------------------------------------------------------
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air"
# Outras opções: "default" | "aqua" | "contrast" | "dark" | "mint"

# ---------------------------------------------------------------
# IDIOMA E FUSO
# ---------------------------------------------------------------
locale: "pt-BR"
timezone: "America/Recife"
lang: pt-BR

# ---------------------------------------------------------------
# POSTS
# ---------------------------------------------------------------
read_time: true
words_per_minute: 200
comments:
  provider: false  # habilite depois com "giscus" ou "disqus"

# ---------------------------------------------------------------
# MENU DE NAVEGAÇÃO
# ---------------------------------------------------------------
navigation:
  main:
    - title: "Início"
      url: /
    - title: "Sobre Mim"
      url: /sobre/
    - title: "Artigos"
      url: /artigos/
    - title: "Categorias"
      url: /categorias/
    - title: "Tags"
      url: /tags/
    - title: "Portfólio"
      url: /portfolio/
    - title: "Contato"
      url: /contato/

# ---------------------------------------------------------------
# PAGINAÇÃO
# ---------------------------------------------------------------
paginate: 6
paginate_path: /page:num/

# ---------------------------------------------------------------
# DEFAULTS
# ---------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      share: true

# ---------------------------------------------------------------
# COLEÇÕES
# ---------------------------------------------------------------
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# ---------------------------------------------------------------
# PLUGINS
# ---------------------------------------------------------------
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# ---------------------------------------------------------------
# SEO E BUSCA
# ---------------------------------------------------------------
og_image: "/assets/images/og-default.jpg"
search: true
search_full_content: true

# ---------------------------------------------------------------
# ANALYTICS (descomente quando tiver o ID)
# ---------------------------------------------------------------
# analytics:
#   provider: "google-gtag"
#   google:
#     tracking_id: "G-XXXXXXXXXX"
#     anonymize_ip: true

# ---------------------------------------------------------------
# EXCLUDE
# ---------------------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache
  - README.md
