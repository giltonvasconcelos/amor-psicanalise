# =============================================================
#   _config.yml - Amor e Psicanalise
#   Repositorio: giltonvasconcelos/amor-psicanalise
# =============================================================

title: "Amor e Psicanálise"
subtitle: "Entre o inconsciente e o amor, novos caminhos de autenticidade"
description: >-
  O amor marca nossas vidas — quando existe, quando falta ou quando é insuficiente.
  Aqui, reflexões se transformam em janelas abertas para o sentir e o pensar.
  Por Gilton Vasconcelos.

url: "https://giltonvasconcelos.github.io"
baseurl: "/amor-psicanalise"

repository: "giltonvasconcelos/amor-psicanalise"

# ---------------------------------------------------------------
# AUTOR
# ---------------------------------------------------------------
author:
  name: "Gilton Vasconcelos"
  avatar: "/amor-psicanalise/assets/images/avatar.jpg"
  bio: >-
    "O amor marca nossas vidas — quando existe, quando falta ou quando é insuficiente.
    Podemos transformar essas marcas em lições, e não em correntes."
  location: "Brasil"
  links:
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/gilton__vasconcelos/"
    - label: "WhatsApp"
      icon: "fab fa-fw fa-whatsapp"
      url: "https://wa.me/message/TMFLTRW6SXGFI1"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/giltonvasconcelos"

# ---------------------------------------------------------------
# TEMA - Paleta Neutra (bege, cinza, branco)
# ---------------------------------------------------------------
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air"

# ---------------------------------------------------------------
# IDIOMA E FUSO
# ---------------------------------------------------------------
locale: "pt-BR"
timezone: "America/Recife"
lang: pt-BR

# ---------------------------------------------------------------
# POSTS
# ---------------------------------------------------------------
read_time: true
words_per_minute: 200
comments:
  provider: false

# ---------------------------------------------------------------
# MENU DE NAVEGACAO
# ---------------------------------------------------------------
navigation:
  main:
    - title: "Início"
      url: /amor-psicanalise/
    - title: "A Psicanálise"
      url: /amor-psicanalise/a-psicanalise/
    - title: "Artigos e Reflexões"
      url: /amor-psicanalise/artigos/
    - title: "Sobre esse Projeto"
      url: /amor-psicanalise/sobre/
    - title: "Perguntas Frequentes"
      url: /amor-psicanalise/faq/
    - title: "Contato"
      url: /amor-psicanalise/contato/

# ---------------------------------------------------------------
# PAGINACAO
# ---------------------------------------------------------------
paginate: 6
paginate_path: /amor-psicanalise/page:num/

# ---------------------------------------------------------------
# DEFAULTS
# ---------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# ---------------------------------------------------------------
# PLUGINS
# ---------------------------------------------------------------
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# ---------------------------------------------------------------
# SEO E BUSCA
# ---------------------------------------------------------------
og_image: "/amor-psicanalise/assets/images/og-default.jpg"
search: true
search_full_content: true

# ---------------------------------------------------------------
# RODAPE
# ---------------------------------------------------------------
footer:
  links:
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/gilton__vasconcelos/"
    - label: "WhatsApp"
      icon: "fab fa-fw fa-whatsapp"
      url: "https://wa.me/message/TMFLTRW6SXGFI1"
  text: >-
    © 2026 Gilton Vasconcelos. Todos os direitos reservados. |
    <a href="/amor-psicanalise/termos-de-uso/">Termos de Uso</a> |
    <a href="/amor-psicanalise/politica-de-privacidade/">Política de Privacidade</a>

# ---------------------------------------------------------------
# ANALYTICS (descomente quando tiver o ID)
# ---------------------------------------------------------------
# analytics:
#   provider: "google-gtag"
#   google:
#     tracking_id: "G-XXXXXXXXXX"
#     anonymize_ip: true

# ---------------------------------------------------------------
# EXCLUDE
# ---------------------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache
  - README.md
